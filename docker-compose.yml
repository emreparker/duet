services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: duet_dev
      POSTGRES_USER: duet
      POSTGRES_PASSWORD: duet_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duet -d duet_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "7777:7777"
    environment:
      DATABASE_URL: postgresql://duet:duet_dev_pass@db:5432/duet_dev
      PORT: "7777"
      SESSION_SECRET: duet-docker-dev-secret
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:7777/api/calendar/callback}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
